# Netlify deploy config (SPEC §9). Static site, no build step.
[build]
  publish = "."
  command = ""

# Path-based condition routes. /c1, /c2, /c3 each serve the same app shell;
# src/app.js reads window.location.pathname and runs that single condition.
# status = 200 is a rewrite (URL stays /c1), so the path survives for routing.
[[redirects]]
  from = "/c1"
  to = "/index.html"
  status = 200
[[redirects]]
  from = "/c2"
  to = "/index.html"
  status = 200
[[redirects]]
  from = "/c3"
  to = "/index.html"
  status = 200

# Security headers (defensive; tighten CSP once Firebase host is known, §3).
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "no-referrer"
